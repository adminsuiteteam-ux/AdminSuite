services:
  - type: web
    name: adminsuite-api
    runtime: python
    rootDir: admin-suite-backend
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # ── Database ─────────────────────────────────────────────────────────────
      # Xata PostgreSQL — adminsuite (eu-central-1, PostgreSQL 18.4)
      # Branch: main | Free tier: 15GB included
      - key: DATABASE_URL
        value: postgresql://xata:MnNYdUe0PnmFbSMsXlAUJBCf0b53abOx9dboV3ORRrkqSCM5ItYK7edV8EYbl1jp@vupe99lt7d4336l6fuh6845ep8.eu-central-1.xata.tech/xata?sslmode=require
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: adminsuite-api
          property: host
      - key: CORS_ALLOWED_ORIGINS
        value: https://adminsuite.onrender.com,https://adminsuite-web.onrender.com
      # ── Email (Gmail SMTP) ───────────────────────────────────────────────────
      # Configure your Gmail username and 16-character App Password.
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # ── Other services ───────────────────────────────────────────────────────
      - key: CLOUDINARY_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@adminsuite.app
      - key: ADMIN_PASSWORD
        value: "AdminDimaro2210!"
      - key: SETUP_SECRET_TOKEN
        value: adminsuite-setup-9x7k2p
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: web
    name: adminsuite
    runtime: static
    rootDir: admin-suite-landing
    buildCommand: npm run build
    staticPublishPath: dist

  - type: web
    name: adminsuite-web
    runtime: static
    rootDir: admin-suite-web
    buildCommand: npm run build
    staticPublishPath: dist

